apiVersion: v1
kind: Service
metadata:
  name: podinfo-2
  annotations:
    # don't do direct server return
    service.cilium.io/forwarding-mode: snat
spec:
  type: LoadBalancer
  selector:
    app: podinfo
  ports:
    - name: http
      port: 9898
      protocol: TCP
      targetPort: http
    - port: 9999
      targetPort: grpc
      protocol: TCP
      name: grpc
