apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    workload-identity.stackit.cloud/service-account-email: loadbalancer-r5uwygi8@sa.stackit.cloud
    workload-identity.stackit.cloud/idp-token-endpoint: https://accounts.qa.stackit.cloud/oauth/v2/token
  name: lb-controller
  namespace: cilium-lbaas
