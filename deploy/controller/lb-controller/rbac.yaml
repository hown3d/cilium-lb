  verbs:
  - create
  - update
  - delete
  - get
  - list
  - watch
  - patch
- apiGroups:
  - ""
  resources:
  - services/status
  verbs:
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "cilium.io"
  resources:
  - ciliumloadbalancerippools
  verbs:
  - create
  - update
  - list
  - watch
  - get
  - delete
- apiGroups:
  - "cilium.io"
  resources:
  - ciliuml2announcementpolicies
  verbs:
  - list
  - watch
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lb-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lb-controller
subjects:
- kind: ServiceAccount
  name: lb-controller
  namespace: cilium-lbaas
---

