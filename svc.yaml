apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pods
  namespace: default
  labels:
    app: test-pods
spec:
  selector:
    matchLabels:
      app: test-pods
  replicas: 3
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: test-pods
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
      - name: test-pods
        image: caddy:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
          - mountPath: /etc/caddy
            name: caddy
      volumes:
        - name: caddy
          configMap:
            name: caddy
---
# https://kubernetes.io/docs/concepts/configuration/configmap/
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy
  namespace: default
data:
  Caddyfile: |-
    :80 {
        # Set this path to your site's directory.
        root * /usr/share/caddy

        # Enable the static file server.
        file_server

        log {
          format console
          output stdout
        }
    }
---
# https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: test-pods
  namespace: default
  labels:
    cilium.lbaas/network: "a99021f6-8eb3-4c5f-8820-32a9802058ec"
spec:
  type: LoadBalancer
  loadBalancerClass: io.cilium/l2-announcer
  ports:
  - name: http
    protocol: TCP
    port: 80
  selector:
    app: test-pods
---
