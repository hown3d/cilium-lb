apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pods
  namespace: default
  labels:
    app: test-pods
spec:
  selector:
    matchLabels:
      app: test-pods
  replicas: 3
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: test-pods
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      containers:
      - name: test-pods
        image: traefik/whoami:latest
        ports:
        - containerPort: 80
          name: http
---
# https://kubernetes.io/docs/concepts/services-networking/service/
apiVersion: v1
kind: Service
metadata:
  name: test-pods
  namespace: default
  labels:
    service.cilium.io/forwarding-mode: snat
spec:
  type: LoadBalancer
  loadBalancerClass: cilium.stackit.cloud
  ports:
  - name: http
    protocol: TCP
    targetPort: http
    port: 80
  selector:
    app: test-pods
---
